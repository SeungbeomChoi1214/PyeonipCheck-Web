<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>편입 합격 예측 서비스 V2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .card { border: none; border-radius: 15px; }
        .card-header { border-radius: 15px 15px 0 0 !important; background: linear-gradient(45deg, #007bff, #0056b3); }
        .result-box { display: none; margin-top: 20px; padding: 20px; border-radius: 10px; }
        .pass { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .fail { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .form-label { font-weight: 600; font-size: 0.95rem; color: #333; }
        .btn-check:checked + .btn-outline-primary { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header text-white text-center py-3">
                    <h5 class="mb-0 fw-bold">🚀 편입 합격 예측기 V2</h5>
                    <small style="opacity: 0.8;">동일계 여부 및 기출 점수 기반</small>
                </div>
                <div class="card-body p-4">
                    <form id="predictForm">
                        <h6 class="text-primary fw-bold mb-3"><span class="badge bg-primary">STEP 1</span> 목표 대학</h6>
                        <div class="mb-3">
                            <label class="form-label">지원 대학</label>
                            <select class="form-select" id="univ" required>
                                <option value="건국대학교" selected>건국대학교</option>
                                <option value="한양대학교">한양대학교</option>
                                <option value="홍익대학교">홍익대학교</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">지원 학과</label>
                            <select class="form-select" id="dept" required>
                                <option value="" disabled selected>대학을 먼저 선택해주세요</option>
                            </select>
                        </div>

                        <hr class="my-4">

                        <h6 class="text-primary fw-bold mb-3"><span class="badge bg-primary">STEP 2</span> 나의 스펙 (서류 예측)</h6>
                        <div class="mb-3">
                            <label class="form-label">전적대 학점 (GPA)</label>
                            <input type="number" class="form-control" id="gpa" step="0.1" value="3.5" placeholder="4.5 만점 기준">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">지원 학과와의 전공 일치도</label>
                            <div class="d-flex gap-2">
                                <input type="radio" class="btn-check" name="major_match" id="match_high" value="high" checked>
                                <label class="btn btn-outline-primary flex-fill" for="match_high">동일계<br><small>(전공 일치)</small></label>

                                <input type="radio" class="btn-check" name="major_match" id="match_mid" value="mid">
                                <label class="btn btn-outline-primary flex-fill" for="match_mid">유사계열<br><small>(조금 다름)</small></label>

                                <input type="radio" class="btn-check" name="major_match" id="match_low" value="low">
                                <label class="btn btn-outline-primary flex-fill" for="match_low">비동일계<br><small>(교차지원)</small></label>
                            </div>
                            <div class="form-text text-muted mt-2">※ 동일계일수록 서류 점수가 높게 산정됩니다.</div>
                        </div>

                        <hr class="my-4">

                        <h6 class="text-primary fw-bold mb-3"><span class="badge bg-primary">STEP 3</span> 필기 실력 (기출/모의)</h6>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">영어 (기출/모의)</label>
                                <input type="number" class="form-control" id="eng" value="0" placeholder="점수 입력">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">수학 (기출/모의)</label>
                                <input type="number" class="form-control" id="math" value="0" placeholder="점수 입력">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 btn-lg mt-3 fw-bold">🏆 합격 가능성 분석하기</button>
                    </form>

                    <div id="resultArea" class="result-box">
                        <h5 id="resultTitle" class="fw-bold text-center"></h5>
                        <p id="resultDesc" class="text-center fw-bold"></p>
                        <hr>
                        <ul id="scoreList" class="list-group list-group-flush small"></ul>
                        <div class="alert alert-secondary mt-3 mb-0 small text-center">
                            💡 <strong>Tip:</strong> 서류 점수는 선택하신 '전공 일치도'를 기준으로 AI가 자동 산출했습니다.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const univSelect = document.getElementById("univ");
    const deptSelect = document.getElementById("dept");

    // 📌 1. 학과 목록 불러오기 (기존과 동일)
    async function loadDepartments() {
        const univName = univSelect.value;
        deptSelect.innerHTML = '<option value="" disabled selected>로딩 중...</option>';
        try {
            const response = await fetch(`/departments/${univName}`);
            const depts = await response.json();
            deptSelect.innerHTML = '<option value="" disabled selected>학과를 선택하세요</option>';
            depts.forEach(dept => {
                const option = document.createElement("option");
                option.value = dept;
                option.text = dept;
                deptSelect.appendChild(option);
            });
        } catch (error) {
            deptSelect.innerHTML = '<option value="" disabled>목록 로딩 실패</option>';
        }
    }
    univSelect.addEventListener("change", loadDepartments);
    document.addEventListener("DOMContentLoaded", loadDepartments);

    // 📌 2. 합격 예측 요청
    document.getElementById("predictForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        // 🧠 [핵심 로직] 사용자가 선택한 '전공 일치도'를 '서류 점수'로 자동 변환
        // 동일계(High) -> 95점, 유사(Mid) -> 85점, 비동일(Low) -> 70점 (예시 로직)
        const matchValue = document.querySelector('input[name="major_match"]:checked').value;
        let calculatedDocScore = 0;
        
        if (matchValue === 'high') calculatedDocScore = 95;
        else if (matchValue === 'mid') calculatedDocScore = 85;
        else calculatedDocScore = 70;

        const data = {
            target_univ: univSelect.value,
            target_dept: deptSelect.value,
            my_gpa: parseFloat(document.getElementById("gpa").value) || 0,
            my_eng_score: parseFloat(document.getElementById("eng").value) || 0,
            my_math_score: parseFloat(document.getElementById("math").value) || 0,
            my_doc_score: calculatedDocScore, // 👈 여기가 자동 계산된 점수 들어가는 곳!
            my_interview_score: 0
        };

        const resultArea = document.getElementById("resultArea");

        try {
            const response = await fetch("/predict/admission", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (!response.ok) {
                alert(result.detail || "오류 발생");
                return;
            }

            resultArea.style.display = "block";
            const isPass = result.is_passed_stage1; 
            resultArea.className = "result-box " + (isPass ? "pass" : "fail");
            
            document.getElementById("resultTitle").innerText = isPass ? "🎉 1단계 합격 안정권!" : "⚠️ 불합격 위험";
            document.getElementById("resultDesc").innerText = result.score_details.message;

            const scores = result.score_details;
            document.getElementById("scoreList").innerHTML = `
                <li class="list-group-item bg-transparent d-flex justify-content-between">
                    <span>1단계 환산 점수</span> <strong>${scores.stage1_total}점</strong>
                </li>
                <li class="list-group-item bg-transparent d-flex justify-content-between">
                    <span>예측 서류 점수</span> <strong>${calculatedDocScore}점</strong>
                </li>
                <li class="list-group-item bg-transparent d-flex justify-content-between border-top">
                    <span>최종 환산 총점</span> <strong class="text-primary">${scores.final_total}점</strong>
                </li>
            `;

        } catch (error) {
            alert("서버 연결 실패");
        }
    });
</script>

</body>
</html>
